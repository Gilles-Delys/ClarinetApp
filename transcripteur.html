<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Transcripteur Clarinette PRO</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }
        .container {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(15px);
            padding: 25px;
            border-radius: 20px;
            text-align: center;
            border: 1px solid rgba(255,255,255,0.1);
            width: 100%;
            max-width: 650px;
        }
        .controls { display: flex; gap: 10px; justify-content: center; margin-bottom: 20px; }
        button {
            padding: 12px 24px;
            font-size: 1rem;
            font-weight: 600;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s;
        }
        #btn-start { background: #4cc9f0; color: #000; }
        #btn-stop { background: #f72585; color: white; display: none; }
        
        .settings {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 20px;
            background: rgba(0,0,0,0.2);
            padding: 15px;
            border-radius: 12px;
            text-align: left;
        }
        .settings-full { grid-column: span 2; }
        label { font-size: 0.8rem; display: block; margin-bottom: 5px; color: #4cc9f0; }
        select, input[type="range"] { width: 100%; cursor: pointer; }
        select { padding: 5px; border-radius: 5px; background: #333; color: white; border: 1px solid #555; }
        
        #transcription-box {
            background: #000;
            color: #00ff00;
            min-height: 150px;
            max-height: 300px;
            overflow-y: auto;
            border-radius: 10px;
            padding: 20px;
            font-family: 'Courier New', monospace;
            font-size: 1.2rem;
            line-height: 1.6;
            text-align: left;
            border: 1px solid #333;
        }
    </style>
</head>
<body>

<div class="container">
    <h1 style="color: #4cc9f0; margin-top:0;">Transcripteur Rapide 🚀</h1>
    
    <div class="settings">
        <div class="settings-full">
            <label>Source Audio (Micro ou Mixage Stéréo)</label>
            <select id="audio-source">
                <option value="">Chargement des périphériques...</option>
            </select>
        </div>
        
        <div>
            <label>Sensibilité (Amplification / Gain)</label>
            <input type="range" id="gain-range" min="1" max="20" step="0.5" value="5">
            <div style="font-size:0.7rem">Augmenter si la source est faible</div>
        </div>
        <div>
            <label>Seuil de bruit (Gate)</label>
            <input type="range" id="gate-range" min="0.001" max="0.1" step="0.001" value="0.01">
        </div>

        <div>
            <label>Vitesse de capture (Stabilité)</label>
            <input type="range" id="speed-range" min="1" max="10" value="2">
        </div>
        <div>
            <label>Détection des répétitions (Silences)</label>
            <input type="range" id="silence-range" min="2" max="30" value="8">
            <div style="font-size:0.7rem">Petit = Sépare vite les notes (sol sol sol)</div>
        </div>
    </div>

    <div class="controls">
        <button id="btn-start">▶️ LANCER L'ÉCOUTE</button>
        <button id="btn-stop">⏹️ STOP & EXPORT .TXT</button>
    </div>

    <div id="transcription-box">Les notes s'afficheront ici...</div>
    <p style="font-size: 0.7rem; margin-top: 15px; opacity: 0.6;">Astuce : Si la liste des sources est vide, lancez l'écoute une fois pour autoriser le navigateur, puis rechargez la page.</p>
</div>

<script>
const NOTES_DATA = {
    "E3": 146.83, "F3": 155.56, "F#3": 164.81, "G3": 174.61, "G#3": 185.00, "A3": 196.00, "A#3": 207.65, "B3": 220.00, 
    "C4": 233.08, "C#4": 246.94, "D4": 261.63, "D#4": 277.18, "E4": 293.66, "F4": 311.13, "F#4": 329.63, "G4": 349.23, 
    "G#4": 369.99, "A4": 392.00, "A#4": 415.30, "B4": 440.00, "C5": 466.16, "C#5": 493.88, "D5": 523.25, "D#5": 554.37, 
    "E5": 587.33, "F5": 622.25, "F#5": 659.25, "G5": 698.46, "G#5": 739.99, "A5": 783.99, "A#5": 830.61, "B5": 880.00, "C6": 932.33
};

const EN_TO_FR = {"C":"do","C#":"do#","D":"re","D#":"re#","E":"mi","F":"fa","F#":"fa#","G":"sol","G#":"sol#","A":"la","A#":"la#","B":"si"};

let audioContext, analyser, microphone, gainNode, isListening = false, animationId;
let transcription = [], lastRecordedNote = null, stableFrames = 0, silenceFrames = 0;

async function loadDevices() {
    try {
        await navigator.mediaDevices.getUserMedia({ audio: true }); 
        const devices = await navigator.mediaDevices.enumerateDevices();
        const audioInputs = devices.filter(d => d.kind === 'audioinput');
        const select = document.getElementById('audio-source');
        select.innerHTML = '';
        audioInputs.forEach((device, index) => {
            const option = document.createElement('option');
            option.value = device.deviceId;
            option.text = device.label || `Entrée Audio ${index + 1}`;
            select.appendChild(option);
        });
    } catch (err) {
        console.error("Veuillez autoriser le micro pour voir les sources.", err);
    }
}
window.addEventListener('load', loadDevices);

async function startListening() {
    audioContext = new (window.AudioContext || window.webkitAudioContext)();
    analyser = audioContext.createAnalyser();
    analyser.fftSize = 2048;
    
    const sourceId = document.getElementById('audio-source').value;
    const stream = await navigator.mediaDevices.getUserMedia({ 
        audio: sourceId ? { deviceId: { exact: sourceId } } : true 
    });
    
    microphone = audioContext.createMediaStreamSource(stream);
    
    gainNode = audioContext.createGain();
    gainNode.gain.value = parseFloat(document.getElementById('gain-range').value);
    
    microphone.connect(gainNode);
    gainNode.connect(analyser);

    document.getElementById('gain-range').addEventListener('input', (e) => {
        if (gainNode) gainNode.gain.value = parseFloat(e.target.value);
    });

    isListening = true;
    transcription = [];
    document.getElementById('transcription-box').innerHTML = "";
    document.getElementById('btn-start').style.display = 'none';
    document.getElementById('btn-stop').style.display = 'block';
    updatePitch();
}

function autoCorrelate(buf, sampleRate) {
    let size = buf.length, rms = 0;
    for (let i = 0; i < size; i++) rms += buf[i] * buf[i];
    rms = Math.sqrt(rms / size);
    if (rms < parseFloat(document.getElementById('gate-range').value)) return -1;

    let r1 = 0, r2 = size - 1, thres = 0.2;
    for (let i = 0; i < size / 2; i++) if (Math.abs(buf[i]) < thres) { r1 = i; break; }
    for (let i = 1; i < size / 2; i++) if (Math.abs(buf[size - i]) < thres) { r2 = size - i; break; }
    buf = buf.slice(r1, r2);
    size = buf.length;

    let c = new Array(size).fill(0);
    for (let i = 0; i < size; i++) {
        for (let j = 0; j < size - i; j++) c[i] = c[i] + buf[j] * buf[j + i];
    }
    
    // CORRECTION CRITIQUE : Chercher la première traversée de zéro pour ignorer les harmoniques (le faux Sol#)
    let d = 0; 
    while (c[d] > 0 && d < size) d++; 
    
    let maxval = -1, maxpos = -1;
    for (let i = d; i < size; i++) {
        if (c[i] > maxval) { maxval = c[i]; maxpos = i; }
    }
    let T0 = maxpos;
    if (T0 <= 0) return -1;

    let x1 = c[T0-1], x2 = c[T0], x3 = c[T0+1];
    let a = (x1 + x3 - 2 * x2) / 2, b = (x3 - x1) / 2;
    if (a) T0 = T0 - b / (2 * a);
    return sampleRate / T0;
}

function updatePitch() {
    if (!isListening) return;
    const buf = new Float32Array(analyser.fftSize);
    analyser.getFloatTimeDomainData(buf);
    const freq = autoCorrelate(buf, audioContext.sampleRate);
    
    let minDiff = Infinity, closestNote = null, targetFreq = 0;
    
    if (freq !== -1) {
        for (let [note, tFreq] of Object.entries(NOTES_DATA)) {
            let diff = Math.abs(freq - tFreq);
            if (diff < minDiff) { minDiff = diff; closestNote = note; targetFreq = tFreq; }
        }
    }

    // CORRECTION : Tolérance en pourcentage (~4%) au lieu des 25 Hz fixes, et gestion stricte des vrais silences
    if (freq === -1 || (closestNote && minDiff >= targetFreq * 0.04)) {
        const maxSilence = parseInt(document.getElementById('silence-range').value);
        if (++silenceFrames > maxSilence) {
            lastRecordedNote = null; // Libère la mémoire pour permettre de répéter "Do Do Do"
        }
        stableFrames = 0;
    } else {
        silenceFrames = 0;
        if (closestNote === lastRecordedNote) {
            stableFrames = 0; // On attend une vraie coupure (silence) avant de pouvoir répéter la même note
        } else {
            if (++stableFrames >= parseInt(document.getElementById('speed-range').value)) {
                lastRecordedNote = closestNote;
                let fr = (EN_TO_FR[closestNote.match(/^([A-G][#]?)/)[1]] || "") + closestNote.slice(-1);
                transcription.push(fr);
                document.getElementById('transcription-box').innerText = transcription.join(' ');
                stableFrames = 0;
            }
        }
    }
    animationId = requestAnimationFrame(updatePitch);
}

document.getElementById('btn-stop').addEventListener('click', () => {
    isListening = false;
    cancelAnimationFrame(animationId);
    if (microphone) microphone.disconnect();
    if (gainNode) gainNode.disconnect();
    const blob = new Blob([transcription.join(' ')], { type: "text/plain" });
    const a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = "Ma_Partition.txt";
    a.click();
    document.getElementById('btn-start').style.display = 'block';
    document.getElementById('btn-stop').style.display = 'none';
});

document.getElementById('btn-start').addEventListener('click', startListening);
</script>
</body>
</html>
